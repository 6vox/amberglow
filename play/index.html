<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMBERGLOW — Play</title>
    <link rel="stylesheet" href="/src/styles/play.css" />
  </head>
  <body>
    <canvas id="stage" aria-label="AMBERGLOW generative projection"></canvas>
    <aside id="help" class="help" hidden>
      <h1>AMBERGLOW</h1>
      <ul>
        <li><kbd>F</kbd> フルスクリーン</li>
        <li><kbd>1</kbd> 昼パレット</li>
        <li><kbd>2</kbd> 夕方パレット</li>
        <li><kbd>3</kbd> 日没パレット</li>
        <li><kbd>4</kbd> 夜パレット</li>
        <li><kbd>0</kbd> 時刻連動（自動）</li>
        <li><kbd>↑</kbd> / <kbd>↓</kbd> 速度</li>
        <li><kbd>D</kbd> デバッグ表示</li>
        <li><kbd>H</kbd> このヘルプ</li>
      </ul>
    </aside>
    <aside id="debug" class="debug">
      <div class="debug-row">
        <label for="speed-slider">speed</label>
        <strong id="speed-value">0.12</strong>
      </div>
      <input
        id="speed-slider"
        type="range"
        min="0.01"
        max="2"
        step="0.01"
        value="0.12"
      />
      <div class="debug-row debug-row-spaced">
        <label for="fade-slider">edgeFadePx</label>
        <strong id="fade-value">100</strong>
      </div>
      <input
        id="fade-slider"
        type="range"
        min="20"
        max="240"
        step="1"
        value="100"
      />
      <p class="debug-hint">↑↓ speed · F fullscreen · D hide</p>
    </aside>
    <script type="module" src="/src/play/main.ts"></script>
  </body>
</html>
