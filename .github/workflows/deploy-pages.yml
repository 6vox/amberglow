name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Add .nojekyll
        run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Ensure GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            try {
              await github.rest.repos.getPages({ owner, repo })
              core.info('GitHub Pages already enabled')
            } catch (error) {
              if (error.status !== 404) throw error
              core.info('Enabling GitHub Pages (workflow build)')
              await github.rest.repos.createPagesSite({
                owner,
                repo,
                build_type: 'workflow',
              })
            }
      - id: deployment
        uses: actions/deploy-pages@v4
